# =====================================================
# TEMPLATE secrets.toml — NE PAS COMMITTER DANS LE REPO
# Coller dans : Streamlit Cloud → App settings → Secrets
# =====================================================

[db]
host = "VOTRE_RDS_ENDPOINT.rds.amazonaws.com"
port = 5432
name = "postgres"
user = "VOTRE_DB_USER"
password = "VOTRE_DB_PASSWORD"

[aws]
region = "eu-west-1"
access_key_id = "VOTRE_AWS_ACCESS_KEY_ID"
secret_access_key = "VOTRE_AWS_SECRET_ACCESS_KEY"

# =====================================================
# LANGFUSE — Observabilité (https://cloud.langfuse.com)
# =====================================================
